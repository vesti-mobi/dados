name: Atualizar Relatorio StarkBank VestiPago

on:
  schedule:
    - cron: '0 * * * *'  # de hora em hora
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do disparo manual'
        required: false
        default: 'manual'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar ODBC Driver 18 for SQL Server
        run: |
          . /etc/os-release
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc > /dev/null
          curl -sSL "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/prod.list" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          sudo ACCEPT_EULA=Y apt-get install -y -qq msodbcsql18 unixodbc-dev

      - name: Instalar dependencias Python
        run: pip install pyodbc

      - name: Rodar fetcher StarkBank (Fabric)
        working-directory: relatoriostarkbank
        env:
          FABRIC_REFRESH_TOKEN: ${{ secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
        run: python fetch_data.py

      - name: Rodar fetcher Faturas (API Vesti)
        working-directory: relatoriostarkbank
        env:
          VESTIAPI_TOKEN: ${{ secrets.VESTIAPI_TOKEN }}
        run: python fetch_invoices.py

      - name: Rodar fetcher Cancelados (Fabric)
        working-directory: relatoriostarkbank
        env:
          FABRIC_REFRESH_TOKEN: ${{ secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
        run: python fetch_cancelados.py

      - name: Commit e push se houver mudancas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add relatoriostarkbank/dados.js relatoriostarkbank/invoices.js relatoriostarkbank/cancelados_valores.js 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "sem mudancas"
          else
            git commit -m "Atualizacao StarkBank $(date +'%d/%m/%Y %H:%M')"
            for i in 1 2 3; do
              if git push; then break; fi
              echo "push falhou (tentativa $i), rebase..."
              git pull --rebase origin main || exit 1
            done
          fi
