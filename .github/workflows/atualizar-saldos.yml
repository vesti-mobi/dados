name: Atualizar saldos Stark
on:
  schedule:
    - cron: '7 * * * *'   # toda hora cheia + 7min (evita pico)
  workflow_dispatch:        # permite rodar manualmente

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Buscar saldos
        env:
          VESTI_API_TOKEN: ${{ secrets.VESTI_API_TOKEN }}
        run: |
          cd relatoriostarkbank
          python fetch_saldos.py
      - name: Commit se mudou
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add relatoriostarkbank/saldos.js
          if git diff --staged --quiet; then
            echo "Sem mudanças no saldo."
          else
            git commit -m "auto: atualiza saldo Stark VestiPago"
            git push
          fi
